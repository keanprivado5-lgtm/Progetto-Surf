<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="global.css">
    <title>Checkout - HOPENA</title>
    <style>
        .checkout-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .pay-btn {
            width: 100%;
            padding: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="checkout-container">
        <h2>Dati per il ritiro in sede</h2>
        <form id="payment-form">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="name" required placeholder="">
            </div>
            <div class="form-group">
                <label>Indirizzo Email</label>
                <input type="text" id="name" required placeholder="">
            </div>
            <div class="form-group">
                <label>Numero Carta di Credito</label>
                <input type="text" id="card" required placeholder="" maxlength="16">
            </div>
            <div id="checkout-summary">
            </div>
            <button type="submit" class="pay-btn">Conferma e Paga</button>
        </form>
    </div>

    <script src="global.js"></script>
    <script src="checkout.js"></script>
</body>

</html>
