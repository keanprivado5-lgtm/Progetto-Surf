<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css" type="text/css">
    <link rel="stylesheet" href="abbigliamento.css" type="text/css">
    <title>Abbigliamento - HOPENA</title>
</head>

<body>

    <header class="header-container">
        <nav class="nav-links">
            <ul>
                <li><a href="./chi_siamo.html">Chi siamo</a></li>
                <li><a href="./lezione.html">Lezione</a></li>
                <li><a href="./abbigliamento.html">Abbigliamento</a></li>
                <li><a href="./contatti.html">Contatti</a></li>
            </ul>
        </nav>

        <div class="logo-center">
            <a href="index.html" class="logo-link">
                <img src="./img/logo hopena.png" alt="HOPENA LOGO">
            </a>
        </div>

        <div class="auth-right">
            <a href="#" class="icon-link" title="Carrello" id="cart-icon-btn">
                <img src="./img/icona-linea-carrello.webp" alt="Shop" class="cart-icon">
            </a>

            <a href="./login.html" class="icon-link" title="Login">
                <img src="./img/surfing-icon-surfer-sign-icon-related-to-water-sport-summer-two-tone-icon-style-design-simple-design-editable-vector.webp"
                    alt="login" class="cart-icon">
            </a>
        </div>
    </header>

    <div id="cart-overlay" class="cart-overlay"></div>
    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3>Il tuo Carrello</h3>
            <button id="close-cart" class="close-btn">&times;</button>
        </div>

        <div id="cart-items-container" class="cart-items-container">
            <p class="empty-msg">Il carrello è vuoto.</p>
        </div>

        <div class="cart-footer">
            <div class="cart-total">
                <span>Totale:</span>
                <span class="price-wrapper"><span id="cart-total-amount">0</span>€</span>
            </div>
            <button class="checkout-btn">Procedi all'ordine</button>
        </div>
    </div>

    <div class="main-section">
        <h2 class="title-abbigliamento">Abbigliamento</h2>

        <div class="clothing-container">
            <div class="product-card">
                <h3>Maglietta</h3>
                <img src="./img/Gemini_Generated_Image_iytskfiytskfiyts.png" alt="maglia nera" class="img-nera">
                <img src="./img/Gemini_Generated_Image_iytskfiytskfiyts (1).png" alt="maglia bianca" class="img-bianca"
                    style="display:none;">

                <div class="details">
                    <div class="color-selector">
                        <span class="color-circle black active" data-color="black"></span>
                        <span class="color-circle white" data-color="white"></span>
                    </div>

                    <p>Scegli la taglia</p>
                    <div class="size-buttons">
                        <button type="button">XS</button>
                        <button type="button">S</button>
                        <button type="button">M</button>
                        <button type="button">L</button>
                        <button type="button">XL</button>
                    </div>

                    <p class="price">Prezzo: 30 euro</p>
                    <button class="add-to-cart">Aggiungi al carrello</button>
                </div>
            </div>

            <div class="product-card">
                <h3>Felpa</h3>
                <img src="./img/Gemini_Generated_Image_dnpu6fdnpu6fdnpu.png" alt="felpa nera" class="img-nera">
                <img src="./img/Gemini_Generated_Image_sfwvqmsfwvqmsfwv.png" alt="felpa bianca" class="img-bianca"
                    style="display:none;">

                <div class="details">
                    <div class="color-selector">
                        <span class="color-circle black active" data-color="black"></span>
                        <span class="color-circle white" data-color="white"></span>
                    </div>

                    <p>Scegli la taglia</p>
                    <div class="size-buttons">
                        <button type="button">XS</button>
                        <button type="button">S</button>
                        <button type="button">M</button>
                        <button type="button">L</button>
                        <button type="button">XL</button>
                    </div>

                    <p class="price">Prezzo: 45 euro</p>
                    <button class="add-to-cart">Aggiungi al carrello</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-container">
        <div class="footer-bottom">&copy; 2026 HOPENA - Tutti i diritti riservati.</div>
    </footer>

    <script src="global.js"></script>
</body>

</html>
